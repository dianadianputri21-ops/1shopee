<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}
.card {
  background: #222;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
}
</style>

</head>
<body>

<h2>📊 Dashboard Klik</h2>

<div class="card">
  <h3>Total Klik</h3>
  <p id="klik">Loading...</p>
</div>

<div class="card">
  <h3>Waktu Sekarang</h3>
  <p id="waktu"></p>
</div>

<div class="card">
  <h3>Device Kamu</h3>
  <p id="device"></p>
</div>

<script>
// ambil jumlah klik
fetch("https://api.countapi.xyz/get/shopee-login/klik")
.then(res => res.json())
.then(data => {
  document.getElementById("klik").innerText = data.value;
});

// waktu sekarang
document.getElementById("waktu").innerText = new Date().toLocaleString();

// device
document.getElementById("device").innerText = navigator.userAgent;
</script>

</body>
</html>
